<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoToDo Settings</title>
    <link rel="stylesheet" href="popup.css">
    <style>
        body {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto;
        }
        .options-card {
            max-width: 500px;
            width: 90%;
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .icon-circle {
            width: 80px;
            height: 80px;
            background: var(--primary);
            border-radius: 50%;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            box-shadow: 0 0 20px var(--primary-glow);
        }
        p {
            color: var(--text-dim);
            line-height: 1.6;
        }
        #status {
            margin-top: 16px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="options-card glass">
        <img src="assets/logo.png" alt="Logo" style="width: 80px; height: 80px; margin: 0 auto; border-radius: 16px; box-shadow: 0 0 20px var(--primary-glow);">
        <h1>Microphone Access</h1>
        <p>To use voice recognition in the EchoToDo popup, Chrome requires you to grant microphone access from this settings page first.</p>
        
        <button id="grant-btn" class="btn-primary" style="padding: 12px 24px; font-size: 16px;">Grant Access</button>
        
        <div id="status"></div>
        
        <div style="margin-top: 24px;">
            <a href="#" id="close-btn" class="btn-secondary" style="display: none; text-decoration: none;">Close Settings</a>
        </div>
    </div>
    <script src="options.js"></script>
</body>
</html>
